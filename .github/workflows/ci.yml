name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read  

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: 'Set up node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Linting
        run: npm run lint
      - name: Testing
        run: npm run test
